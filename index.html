<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>無音カメラ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- カメラのプレビュー表示エリア -->
    <div id="camera-view">
        <video id="camera-preview" autoplay playsinline></video>
        
        <!-- 画面フラッシュ用の要素 -->
        <div id="flash-overlay"></div>

        <!-- 左下にサムネイル表示エリアを追加 -->
        <div id="thumbnail-container">
            <img id="thumbnail-preview" alt="最新の写真">
        </div>

        <div class="controls">
            <button id="switch-camera-btn" class="control-btn">🔄</button>
            <button id="shutter-btn" class="shutter"></button>
        </div>
    </div>

    <!-- ギャラリー表示エリア -->
    <div id="gallery-view" class="hidden">
        <img id="gallery-image" alt="撮影した画像">
        
        <!-- 上部のコントロール -->
        <div class="top-controls">
            <span id="counter"></span>
            <button id="close-gallery-btn" class="gallery-btn">完了</button>
        </div>
    </div>

    <!-- 描画用の非表示Canvas -->
    <canvas id="canvas" style="display: none;"></canvas>

    <script src="script.js"></script>
</body>
</html>

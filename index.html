<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>無音カメラ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="manifest.json">
</head>

</head>
<body>
    <!-- カメラのプレビュー表示エリア -->
    <div id="camera-view">
        <video id="camera-preview" autoplay playsinline></video>
        
           <!-- 解像度切替ボタン（削除） -->

        <!-- 【新機能】ブラックアウトモード起動ボタン -->
        <button id="blackout-btn" class="control-btn top-right-btn">
            <span class="material-symbols-outlined">dark_mode</span>
        </button>
        
        <!-- 【新機能】ブラックアウトモード用の黒い画面 -->
        <div id="blackout-overlay" class="hidden"></div>

        <div id="flash-overlay"></div>
        <div id="thumbnail-container">
            <img id="thumbnail-preview" alt="最新の写真">
        </div>

        <div class="controls">
            <button id="shutter-btn" class="shutter"></button>
        </div>
        <button id="switch-camera-btn" class="control-btn">
            <span class="material-symbols-outlined">sync</span>
        </button>
    </div>

    <!-- ギャラリー表示エリア -->
    <div id="gallery-view" class="hidden">
        <img id="gallery-image" alt="撮影した画像">
        <div class="top-controls">
            <span id="counter"></span>
            <button id="close-gallery-btn" class="gallery-btn">完了</button>
        </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>
    <script src="script.js"></script>
</body>
</html>

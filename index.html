<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>無音カメラ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.3/viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.3/viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="camera-view">
        <video id="camera-preview" autoplay playsinline></video>
        
        <button id="blackout-btn" class="control-btn top-right-btn">
            <span class="material-symbols-outlined">dark_mode</span>
        </button>
        
        <div id="blackout-overlay" class="hidden"></div>

        <div id="flash-overlay"></div>
        
        <div id="thumbnail-container">
            <img id="thumbnail-preview" alt="最新の写真">
            <span id="photo-count-badge" class="hidden">0</span>
        </div>

        <div class="sub-controls">
            <button id="save-pdf-btn" class="sub-btn pdf-color">
                <span class="material-symbols-outlined">picture_as_pdf</span>PDF保存
            </button>
            <button id="delete-last-btn" class="sub-btn delete-color">
                <span class="material-symbols-outlined">undo</span>1枚削除
            </button>
            <button id="clear-all-btn" class="sub-btn delete-color">
                <span class="material-symbols-outlined">delete_sweep</span>全削除
            </button>
        </div>

        <div class="controls">
            <button id="shutter-btn" class="shutter"></button>
        </div>
        <button id="switch-camera-btn" class="control-btn">
            <span class="material-symbols-outlined">sync</span>
        </button>
    </div>

    <div id="gallery-view" class="hidden">
        <img id="gallery-image" alt="撮影した画像">
        <div class="top-controls">
            <span id="counter"></span>
            <button id="close-gallery-btn" class="gallery-btn">完了</button>
        </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>
    <script src="script.js"></script>
</body>
</html>
